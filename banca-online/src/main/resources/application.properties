spring.application.name=banca-online

spring.datasource.url=jdbc:mysql://localhost:3307/banca_online?useSSL=false&serverTimezone=UTC
spring.datasource.username=banca_user
spring.datasource.password=mi_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate crea/actualiza tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect