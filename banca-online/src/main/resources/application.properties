spring.application.name=banca-online

spring.datasource.url=jdbc:mysql://localhost:3307/banca_online?useSSL=false&serverTimezone=UTC
spring.datasource.username=banca_user
spring.datasource.password=mi_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# --- JPA Configuration para Spring Boot 4.0.3 ---
# NO uses MySQL8Dialect, usa MySQLDialect (el unificado)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# O mejor aún, deja que Spring Boot lo maneje:
# spring.jpa.database=MYSQL

# Para que no intente crear las tablas automáticamente (ya que usas schema.sql)
spring.jpa.hibernate.ddl-auto=none

# --- Inicialización con schema.sql para Spring Boot 4.x ---
# En Spring Boot 4.x, la propiedad correcta es:
spring.sql.init.mode=always

# (Opcional) Para ver los logs de inicialización
logging.level.org.springframework.jdbc.datasource.init=DEBUG
logging.level.org.hibernate.SQL=DEBUG